name = "disney-tweet-bot"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[triggers]
# JST = UTC+9
# 08:00 JST = 23:00 UTC (前日)
# 13:00 JST = 04:00 UTC
# 16:00 JST = 07:00 UTC
crons = ["0 23 * * *", "0 4 * * *", "0 7 * * *"]

# 返信済みTweetID管理（重複リプライ防止）
# セットアップ: npx wrangler kv namespace create REPLIED_TWEETS
# → 出力されたIDを下の id に設定してください
[[kv_namespaces]]
binding = "REPLIED_TWEETS"
id = "f49bae9ec22f46358b081762438567bc"

name: Update Ticket Prices

on:
  schedule:
    # 毎月1日 午前2時（JST）= UTC 17:00 前日
    - cron: "0 17 28 * *"
  workflow_dispatch: # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch ticket prices
        run: node scripts/update-ticket-prices.mjs

      - name: Check for changes
        id: diff
        run: |
          git diff --exit-code src/lib/ticket-prices-static.ts || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/lib/ticket-prices-static.ts
          git commit -m "chore: チケット価格データを自動更新 ($(date '+%Y-%m'))"
          git push
